<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATSI Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <header class="topbar">
    <div class="container row">
      <div>
        <h1>MATSI ადმინისტრირება</h1>
        <p class="small">სრული მართვა: კონტენტი, დიზაინი, სექციები, პროდუქტები</p>
      </div>
      <div class="actions">
        <a class="ghost" href="../index.html#home">საიტზე დაბრუნება</a>
      </div>
    </div>
  </header>

  <main class="container grid cols-2">
    <section class="card">
      <div class="tabs">
        <button class="tab active" data-tab="settings" type="button">ძირითადი პარამეტრები</button>
        <button class="tab" data-tab="home" type="button">მთავარი გვერდი</button>
        <button class="tab" data-tab="sections" type="button">სექციები</button>
        <button class="tab" data-tab="products" type="button">პროდუქტები</button>
        <button class="tab" data-tab="raw" type="button">RAW JSON</button>
      </div>

      <section id="tab-settings" class="tab-panel">
        <h2>საიტის კონტენტი და თემა</h2>
        <form id="settings-form" class="grid">
          <div><label for="hero_title">Hero სათაური</label><input id="hero_title" name="hero_title"></div>
          <div><label for="hero_subtitle">Hero ქვესათაური</label><textarea id="hero_subtitle" name="hero_subtitle"></textarea></div>
          <div><label for="about_title">About სათაური</label><input id="about_title" name="about_title"></div>
          <div><label for="contact_email">კონტაქტის ელფოსტა</label><input id="contact_email" name="contact_email" type="email"></div>
          <div><label for="contact_phone">კონტაქტის ტელეფონი</label><input id="contact_phone" name="contact_phone"></div>
          <div><label for="contact_address">მისამართი</label><input id="contact_address" name="contact_address"></div>
          <div><label for="instagram_link">Instagram ლინკი</label><input id="instagram_link" name="instagram_link" type="url"></div>
          <div><label for="primary_color">Primary ფერი</label><input id="primary_color" name="primary_color" type="color"></div>
          <div><label for="text_color">Text ფერი</label><input id="text_color" name="text_color" type="color"></div>
          <button class="primary" type="submit">შენახვა</button>
          <p id="settings-msg" class="small"></p>
        </form>
      </section>

      <section id="tab-home" class="tab-panel hidden">
        <h2>მთავარი გვერდის სრული კონტენტი</h2>
        <form id="home-form" class="grid">
          <div><label for="home_hero_kicker">Hero kicker</label><input id="home_hero_kicker" name="home_hero_kicker"></div>
          <div><label for="home_hero_btn_primary">Hero ღილაკი 1</label><input id="home_hero_btn_primary" name="home_hero_btn_primary"></div>
          <div><label for="home_hero_btn_secondary">Hero ღილაკი 2</label><input id="home_hero_btn_secondary" name="home_hero_btn_secondary"></div>
          <div><label for="home_featured_kicker">Featured kicker</label><input id="home_featured_kicker" name="home_featured_kicker"></div>
          <div><label for="home_featured_title">Featured სათაური</label><input id="home_featured_title" name="home_featured_title"></div>
          <div><label for="home_featured_cta">Featured CTA</label><input id="home_featured_cta" name="home_featured_cta"></div>

          <div><label for="home_card1_category">Card1 კატეგორია</label><input id="home_card1_category" name="home_card1_category"></div>
          <div><label for="home_card1_title">Card1 სათაური</label><input id="home_card1_title" name="home_card1_title"></div>
          <div><label for="home_card1_desc">Card1 აღწერა</label><input id="home_card1_desc" name="home_card1_desc"></div>
          <div><label for="home_card1_price">Card1 ფასი</label><input id="home_card1_price" name="home_card1_price"></div>
          <div><label for="home_card1_btn">Card1 ღილაკი</label><input id="home_card1_btn" name="home_card1_btn"></div>

          <div><label for="home_card2_category">Card2 კატეგორია</label><input id="home_card2_category" name="home_card2_category"></div>
          <div><label for="home_card2_title">Card2 სათაური</label><input id="home_card2_title" name="home_card2_title"></div>
          <div><label for="home_card2_desc">Card2 აღწერა</label><input id="home_card2_desc" name="home_card2_desc"></div>
          <div><label for="home_card2_price">Card2 ფასი</label><input id="home_card2_price" name="home_card2_price"></div>
          <div><label for="home_card2_btn">Card2 ღილაკი</label><input id="home_card2_btn" name="home_card2_btn"></div>

          <div><label for="home_card3_category">Card3 კატეგორია</label><input id="home_card3_category" name="home_card3_category"></div>
          <div><label for="home_card3_title">Card3 სათაური</label><input id="home_card3_title" name="home_card3_title"></div>
          <div><label for="home_card3_desc">Card3 აღწერა</label><input id="home_card3_desc" name="home_card3_desc"></div>
          <div><label for="home_card3_price">Card3 ფასი</label><input id="home_card3_price" name="home_card3_price"></div>
          <div><label for="home_card3_btn">Card3 ღილაკი</label><input id="home_card3_btn" name="home_card3_btn"></div>

          <div><label for="home_story_kicker">Story kicker</label><input id="home_story_kicker" name="home_story_kicker"></div>
          <div><label for="home_story_title">Story სათაური</label><input id="home_story_title" name="home_story_title"></div>
          <div><label for="home_story_text">Story ტექსტი</label><textarea id="home_story_text" name="home_story_text"></textarea></div>
          <div><label for="home_story_btn">Story ღილაკი</label><input id="home_story_btn" name="home_story_btn"></div>

          <div><label for="home_stat1_value">Stat1 value</label><input id="home_stat1_value" name="home_stat1_value"></div>
          <div><label for="home_stat1_label">Stat1 label</label><input id="home_stat1_label" name="home_stat1_label"></div>
          <div><label for="home_stat2_value">Stat2 value</label><input id="home_stat2_value" name="home_stat2_value"></div>
          <div><label for="home_stat2_label">Stat2 label</label><input id="home_stat2_label" name="home_stat2_label"></div>
          <div><label for="home_stat3_value">Stat3 value</label><input id="home_stat3_value" name="home_stat3_value"></div>
          <div><label for="home_stat3_label">Stat3 label</label><input id="home_stat3_label" name="home_stat3_label"></div>
          <div><label for="home_stat4_value">Stat4 value</label><input id="home_stat4_value" name="home_stat4_value"></div>
          <div><label for="home_stat4_label">Stat4 label</label><input id="home_stat4_label" name="home_stat4_label"></div>

          <button class="primary" type="submit">შენახვა</button>
          <p id="home-msg" class="small"></p>
        </form>
      </section>

      <section id="tab-sections" class="tab-panel hidden">
        <h2>სექციების ჩართვა/გამორთვა</h2>
        <form id="sections-form" class="grid">
          <label class="check"><input type="checkbox" name="home"> მთავარი</label>
          <label class="check"><input type="checkbox" name="shop"> მაღაზია</label>
          <label class="check"><input type="checkbox" name="about"> ჩვენს შესახებ</label>
          <label class="check"><input type="checkbox" name="contact"> კონტაქტი</label>
          <label class="check"><input type="checkbox" name="designer"> შექმენი შენი დიზაინი</label>
          <label class="check"><input type="checkbox" name="cart"> კალათა</label>
          <button class="primary" type="submit">შენახვა</button>
          <p id="sections-msg" class="small"></p>
        </form>
      </section>

      <section id="tab-products" class="tab-panel hidden">
        <h2>პროდუქტის დამატება/რედაქტირება</h2>
        <form id="products-form" class="grid" data-kind="products">
          <input type="hidden" name="id">
          <div><label>სახელი</label><input name="name" required></div>
          <div><label>წელი</label><input name="year" type="number" required></div>
          <div><label>ფასი (₾)</label><input name="price" type="number" required></div>
          <div><label>ტიპი</label>
            <select name="type">
              <option value="red">წითელი</option>
              <option value="white">თეთრი</option>
              <option value="amber">ქარვისფერი</option>
              <option value="rose">როზე</option>
            </select>
          </div>
          <div><label>კატეგორია</label><input name="category"></div>
          <div><label>ჯიში</label><input name="grape"></div>
          <div><label>რეგიონი</label><input name="region"></div>
          <div><label>ალკოჰოლი</label><input name="alcohol"></div>
          <div><label>ტემპერატურა</label><input name="temperature"></div>
          <div><label>შეხამება</label><input name="pairing"></div>
          <div><label>არომატი</label><input name="aroma"></div>
          <div><label>გემო</label><input name="taste"></div>
          <div><label>აღწერა</label><textarea name="description"></textarea></div>
          <div>
            <label>პროდუქტის ფოტო</label>
            <input id="product_image" name="product_image" type="file" accept="image/*">
            <img id="product-image-preview" class="image-preview hidden" alt="Product preview">
          </div>
          <div class="actions">
            <button class="primary" type="submit">შენახვა</button>
            <button id="products-reset" class="ghost" type="button">გასუფთავება</button>
          </div>
          <p id="products-msg" class="small"></p>
        </form>
      </section>

      <section id="tab-raw" class="tab-panel hidden">
        <h2>RAW JSON</h2>
        <textarea id="raw-json" class="raw" spellcheck="false"></textarea>
        <div class="actions">
          <button id="apply-raw" class="primary" type="button">Apply JSON</button>
          <button id="download-backup" class="ghost" type="button">Export JSON</button>
        </div>
        <p id="raw-msg" class="small"></p>
      </section>
    </section>

    <section class="card">
      <h2>პროდუქტების სია</h2>
      <div id="items-list" class="list"></div>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
